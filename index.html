<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jerry的个人站</title>
  <meta name="description" content="记录想法、项目和日常笔记" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="icon" type="image/svg+xml" href="./assets/mouse-favicon.svg" />
  <link rel="stylesheet" href="./styles.css?v=202603151205" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <img class="header-banner" src="./assets/cat-mouse-banner.svg" alt="卡通风格猫追老鼠横幅插画（原创）" />
      <div class="site-title-row">
        <div>
          <h1>Jerry的个人站</h1>
          <p>写点东西，记录一些有意思的事。</p>
        </div>
        <button id="theme-toggle" class="btn btn-small" type="button">主题：黑夜</button>
      </div>
      <nav>
        <a href="#posts">文章</a>
        <a href="#about">关于</a>
      </nav>
    </div>
  </header>

  <main class="container main-layout">
    <section class="content-column">
      <section id="posts" class="card">
        <h2>最近更新</h2>
        <ul id="post-list" class="post-list"></ul>
      </section>

      <section id="viewer" class="card hidden">
        <div class="viewer-toolbar">
          <div class="viewer-toolbar-left">
            <button id="back-btn" class="btn">← 返回列表</button>
          </div>
          <div class="viewer-toolbar-right">
            <button id="export-pdf-btn" class="btn">导出PDF</button>
            <button id="wechat-btn" class="btn">公众号稿</button>
            <button id="summary-btn" class="btn">3条摘要</button>
          </div>
        </div>
        <article id="post-content" class="markdown-body"></article>
      </section>

      <section id="about" class="card">
        <h2>关于我</h2>
        <p>这是第一版个人站。先用最轻的方式跑起来，后续再迭代成支持后台发布、搜索和评论。</p>
      </section>
    </section>

    <aside class="index-panel">
      <div class="filter-title">索引筛选</div>
      <button id="reset-filter" class="btn btn-small">重置筛选</button>

      <h3>按主题标签</h3>
      <div id="tag-filter" class="chips"></div>

      <h3>按年月</h3>
      <div id="month-filter" class="chips"></div>
    </aside>
  </main>

  <footer class="site-footer">
    <div class="container">© <span id="year"></span> 我的个人站</div>
  </footer>

  <script src="./app.js?v=202603151205"></script>
</body>
</html>
